<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina non trovata — Professionisti</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blu: #1B3A6B;
  --blu-scuro: #0F2347;
  --oro: #B8972A;
  --oro-chiaro: #D4AF37;
  --bianco: #FFFFFF;
  --grigio: #6B7280;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--blu-scuro);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.container {
  max-width: 500px;
}
.numero {
  font-family: 'Playfair Display', serif;
  font-size: 8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--oro), var(--oro-chiaro));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 1rem;
}
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 2rem;
  text-decoration: none;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--oro), var(--oro-chiaro));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.logo-testo {
  color: white;
  font-weight: 700;
  font-size: 1.2rem;
}
.logo-testo span { color: var(--oro-chiaro); }
h1 {
  color: white;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 1rem;
}
p {
  color: rgba(255,255,255,0.6);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 2rem;
}
.btn-home {
  display: inline-block;
  background: linear-gradient(135deg, var(--oro), var(--oro-chiaro));
  color: var(--blu-scuro);
  padding: 14px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 4px 20px rgba(184,151,42,0.4);
}
.btn-home:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(184,151,42,0.5);
}
.links {
  margin-top: 2rem;
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
.link-sec {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 0.9rem;
  transition: 0.2s;
}
.link-sec:hover { color: var(--oro-chiaro); }
.emoji { font-size: 3rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-testo">Profes<span>sionisti</span></div>
  </a>
  <div class="numero">404</div>
  <div class="emoji">🔍</div>
  <h1>Pagina non trovata</h1>
  <p>La pagina che stai cercando non esiste o è stata spostata. Torna alla home e trova il professionista giusto per te!</p>
  <a href="index.html" class="btn-home">🏠 Torna alla Home</a>
  <div class="links">
    <a href="professionista.html" class="link-sec">Diventa Professionista</a>
    <a href="index.html#come-funziona" class="link-sec">Come funziona</a>
    <a href="index.html#contatti" class="link-sec">Contatti</a>
  </div>
</div>
</body>
</html>
